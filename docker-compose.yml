version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - db
    networks:
      - jobsgov-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      - backend
    networks:
      - jobsgov-network

  db:
    image: sqlite:latest
    volumes:
      - ./backend/data:/data
    networks:
      - jobsgov-network

networks:
  jobsgov-network:
    driver: bridge

volumes:
  data:
